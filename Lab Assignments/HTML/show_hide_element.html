<!-- 3. Show/Hide Element
Description: Toggle visibility of a div.
Practice: style.display -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #showVal{
            width: 300px;
            height: 50px;
        }
        #hideVal{
            width: 300px;
            height: 50px;
        }
    </style>
</head>
<body>
    <h1 id="heading">Hello Wolrd</h1>
    <input type="button" onmouseover="show()" id="showVal" name="s" value="Show Data">
    <input type="button" onmouseover="hide()" id="hideVal" name="h" value="Hide Data">
    <script src="../JS/show_hide_element.js"></script>
</body>
</html>
