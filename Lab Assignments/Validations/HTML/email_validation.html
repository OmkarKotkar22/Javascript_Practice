<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Enter Email :
    <input
      type="text"
      name="mail"
      value=""
      id="m"
      placeholder="Enter email"
      onkeyup="checkEmail(this.value)"
    />
    <span id="s"></span><br /><br />
    <button
      onclick="submitForm()"
      style="
        background-color: red;
        color: white;
        font-size: 15px;
        font-weight: 600;
        padding: 10px;
        border: none;
        border-radius: 15px;
        cursor: pointer;
      "
      onmouseover="this.style.backgroundColor = 'green', this.style.color='black'"
      onmouseleave="this.style.backgroundColor = 'red', this.style.color='white'"
    >
      Click here
    </button>

    <script src="../JS/email_validation.js"></script>
  </body>
</html>
