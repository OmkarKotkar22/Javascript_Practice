<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Validation</title>

<style>

/* 🌌 Background */
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
}

/* 📦 Container */
.container{
    background:white;
    padding:30px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    animation:fadeIn 0.7s ease;
}

/* 📝 Inputs */
input{
    width:90%;
    padding:10px;
    border-radius:8px;
    border:2px solid #ccc;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#764ba2;
    box-shadow:0 0 8px rgba(118,75,162,0.5);
}

/* 🔘 Button */
button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#764ba2;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#5a3f8c;
}

/* 📢 Messages */
span{
    display:block;
    margin-top:5px;
    font-weight:bold;
}

/* 🎬 Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<h3>Password Validation</h3>

Enter Password:<br>
<input type="password" id="pwd" onkeyup="checkPwd(this.value)">
<span id="msg1"></span>

<br>

Enter Confirm Password:<br>
<input type="password" id="cpwd" onkeyup="checkConfirm()">
<span id="msg2"></span>

<button onclick="submitForm()">Submit</button>

</div>

<script src="../JS/password_validation.js">

</script>

</body>
</html>
