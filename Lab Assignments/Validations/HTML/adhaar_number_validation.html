<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadhaar Validation</title>

<style>

/* 🌌 Background */
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #1e3c72, #2a5298);
    font-family:Arial, sans-serif;
}

/* 📦 Container */
.container{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    animation:fadeIn 0.8s ease;
}

/* ✨ Heading */
h2{
    margin-bottom:20px;
    color:#333;
}

/* 📝 Input Box */
input{
    width:90%;
    padding:10px;
    border-radius:8px;
    border:2px solid #ccc;
    outline:none;
    font-size:16px;
    transition:0.3s;
}

/* Focus effect */
input:focus{
    border-color:#2a5298;
    box-shadow:0 0 8px rgba(42,82,152,0.5);
}

/* 📢 Message */
#s{
    display:block;
    margin-top:10px;
    font-weight:bold;
    transition:0.3s;
}

/* 🎬 Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <h2>Aadhaar Validation</h2>

    <input type="text" id="adh" placeholder="Enter Aadhaar Number"
           onkeyup="checkAdhaar(this.value)">

    <span id="s"></span>

</div>

<script src="../JS/adhaar_number_validation.js"></script>
</body>
</html>
