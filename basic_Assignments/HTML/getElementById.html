<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
        function show(){
            let headingTag = document.getElementById('h1');
            headingTag.innerHTML = "Good Afternoon";
        }
    </script>
</head>
<body>
    <h1 id="h1">Good Morning</h1>
    <input type="button" name="s" id="s" onclick="show()" value="Click Me">
</body>
</html>
