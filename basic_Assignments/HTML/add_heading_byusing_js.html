<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
        function show(){
            let myDiv = document.getElementById('D');
            let myheading = document.createElement("h1");
            myheading.innerHTML="I am creating by using JS";
            myDiv.appendChild(myheading);
        }
    </script>
</head>
<body>
    <div id="D"></div>
    <input type="button" name="s" id="s" value="Click Me" style="width: 400px; height: 40px;" onclick="show()">
</body>
</html>
